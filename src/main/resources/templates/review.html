<main class="container" style="margin-top: 60px">

    <section class="pt-4 pb-5" data-aos="fade-up" id="example-carousel" >
        <div shiro:guest>

            <h3 class="h5 mb-4 font-weight-bold" th:if="${choice}=='all'">回顾所有</h3>

<!--------------------------------------
JAVASCRIPTS
--------------------------------------->
<script src="/static/assets/js/vendor/jquery.min.js" type="text/javascript"></script>
<script src="/static/assets/js/vendor/popper.min.js" type="text/javascript"></script>
<script src="/static/assets/js/vendor/bootstrap.min.js" type="text/javascript"></script>
<script src="/static/assets/js/vendor/share.js" type="text/javascript"></script>
<script src="/static/assets/js/functions.js" type="text/javascript"></script>
<script src="/static/layui/layui.js" type="text/javascript"></script>
<script src="/static/index.js" type="text/javascript"></script>

<!-- Animation -->
<script src="/static/assets/js/vendor/aos.js" type="text/javascript"></script>
<noscript>
    <style>
        *[data-aos] {
            display: block !important;
            opacity: 1 !important;
            visibility: visible !important;
        }
    </style>
</noscript>
<script>
    var choice = null
    tips()
    var choice_type_review = 'null';

    function tips() {
        choice = $('.choice').attr('name')
        layer.msg(choice, {offset: '86px', anim: 6})
    }

    // 播放音频
    $(document).on('click', '.wAudioq', function (obj) {
        var audio = obj.target.name
        var mp3Url = "/audio/" + audio + '.mp3';
        var player = new Audio(mp3Url);
        player.play(); //播放 mp3这个音频对象
    });

    layui.use(['layer', 'table', 'form'], function () {
        var table = layui.table;
        //第一个实例 查询数据
        judgeMold()

        function judgeMold() {
            let url = null
            choice_type_review = 'null'
            if (choice === 'today') {
                url = '/english/reviewStudiedWordsByDate'; // 今天的复习
            }
            if (choice === 'sign') { // 复习标志词
                url = '/english/signWordReview/false'
            }
            if (choice === 'all') { // 复习所有的标志词
                url = '/english/signWordReview/true'
                choice_type_review = 'all'
            }
            if (url !== null) {
                queryData(url)
            } else {
                layer.msg('请刷新重试', {offset: '86px', anim: 6})
            }
        }

        // 获取表格数据
        function queryData(url) {
            table.render({
                elem: '#imgTable'
                , url: url //数据接口
                , id: 'search_table_id'
                , page: true
                , skin: 'gird'
                , parseData: function (res) {
                    return {
                        "code": res.code, // 解析接口状态
                        "msg": res.msg, // 解析提示文本
                        "count": res.count, // 解析数据长度
                        "data": res.data // 解析数据列表
                    };
                }
                , response: {
                    statusCode: 200 //规定成功的状态码
                }
                , limits: [10, 20, 30, 40, 50, 60, 90, 1000]
                , cols: [
                    [
                        {
                            field: 'wen', title: '英文', width: '30%', align: 'center', templet: function (d) {
                                return '<div lay-event="queryWord"><p style="font-size: 16px; color: red">'
                                    + d.wen
                                    + '<p style="font-size: 12px;color: #6b6e71">'
                                    + d.wphonetic
                                    + '</p></p></div>'
                            }
                        }
                        , {
                        field: 'wzh', title: '中文', width: '30%', align: 'center', hide: false, templet: function (d) {
                            if (choice_type_review === 'all'){
                                return '<span style="font-size: 12px; display: inline" class="wzhDisplay' + d.id + '">' + d.wzh + '</span>'
                            }
                            return '<button lay-event="checkZh" class="layui-btn layui-btn-radius layui-btn-normal ' +
                                'isWzhDisplay' + d.id + ' layui-anim layui-anim-scaleSpring layui-btn-sm">' + '查看' + '</button>' +
                                '<span style="font-size: 12px; display: none" class="wzhDisplay' + d.id + '">' + d.wzh + '</span>'
                        }
                    }
                        , {
                        field: 'wimportant', title: '读音', align: 'center', width: '10%', templet: function (d) {
                            return '<i class="layui-icon layui-icon-speaker layui-anim layui-anim-scaleSpring" ' +
                                'lay-event="clickAudio" style="font-size: 25px;color: #5a1aba">' +
                                '<span style="font-size: 12px" class="wRank' + d.id + '"></span></i>'
                        }
                    }
                        , {title: '操作', Width: '30%', templet: '#toolEventDemo'}
                    ]
                ],
                done: function () {
                    $('.layui-laypage-skip').attr('hidden', 'true')
                }
            });
        }

        // 表格 触发事件  编辑|删除 <table id="imgTable" lay-filter="imgFilter"></table>
        table.on('tool(imgFilter)', function (obj) {
            var data = obj.data; //获得当前行数据
            var layEvent = obj.event; //获得 lay-event 对应的值（也可以是表头的 event 参数对应的值）

            if (layEvent === 'clickAudio') { //播放音频
                var mp3Url = "/audio/" + data.waudio + '.mp3';
                var player = new Audio(mp3Url);
                player.play(); //播放 mp3这个音频对象
            } else if (layEvent === 'checkZh') { //查看中文
                $('.isWzhDisplay' + data.id).css('display', 'none')
                $('.wzhDisplay' + data.id).css('display', 'inline')
            } else if (layEvent === 'addSign') { //编辑
                $.ajax({
                    url: '/english/updateSign/' + data.id + '/true',
                    method: 'get',
                    success: function (res) {
                        if (res.code === 200) {
                            $('.wRank' + data.id).text(res.msg)
                        } else {
                            layer.msg(res.msg)
                        }
                    }
                })
            } else if (layEvent === 'redSign') {
                $.ajax({
                    url: '/english/updateSign/' + data.id + '/false',
                    method: 'get',
                    success: function (res) {
                        if (res.code === 200) {
                            if (res.msg === '0') {
                                obj.del()
                            }
                            $('.wRank' + data.id).text(res.msg)
                        } else {
                            layer.msg(res.msg)
                        }
                    }
                })
            } else if (layEvent === 'queryWord') {
                queryWord(data.wzh)
            }

        });
    })

    // <div class="tableTouch"> </div>
    var touchStartX = 0;
    var touchEndX = 0;
    var touchStartY = 0;
    var touchEndY = 0;
    $touch = $('.tableTouch')
    $touch.on('touchstart', function(e) {
        touchStartX = e.originalEvent.changedTouches[0].clientX;
        touchStartY = e.originalEvent.changedTouches[0].clientY;
    });
    $touch.on('touchend', function(e) {
        touchEndX = e.originalEvent.changedTouches[0].clientX;
        touchEndY = e.originalEvent.changedTouches[0].clientY;
        var diffX = touchStartX - touchEndX;
        var diffY = touchStartY - touchEndY;
        if (diffX > 80 && (diffY < 20 && diffY > -20)) {
            // 左滑响应
            function nextClick() {
                $('.layui-laypage-next i').click()
            }
            debounce(nextClick, 1000)
        } else if (diffX < -80 && (diffY < 20 && diffY > -20)) {
            // 右滑响应
            function prevClick() {
                $('.layui-laypage-prev i').click()
            }
            debounce(prevClick, 1000)
        }
    });



    AOS.init({
        duration: 700
    });

    <!-- 禁用小于 1200px 的动画，如果你喜欢可以更改值 -->

    AOS.init({
        disable: function () {
            var maxWidth = 1200;
            return window.innerWidth < maxWidth;
        }
    });
    $(function () {
        $('[data-toggle="popover"]').popover()
    })
    $('.popover-dismiss').popover({
        trigger: 'focus'
    })
    $(function () {
        $('[data-toggle="tooltip"]').tooltip()
    })
</script>
<script type="text/html" id="toolEventDemo">
    <div style="height: auto; width: auto; text-align: left; margin: 2px 1px">
        <p>
            <button type="button" class="layui-btn layui-btn-normal layui-btn-radius layui-btn-sm" lay-event="addSign">
                等级 <span style="color: red; font-size: 16px">↑</span>
            </button>
        </p>
        <p>
            <button class="layui-btn layui-btn-danger layui-btn-radius layui-btn-sm" lay-event="redSign">
                等级 <span style="color: #05d3e5; font-size: 16px">↓</span>
            </button>
        </p>

    </div>
</script>
</body>
</html>
