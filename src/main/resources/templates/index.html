<noscript>
    <style>
        *[data-aos] {
            display: block !important;
            opacity: 1 !important;
            visibility: visible !important;
        }
    </style>
</noscript>
<script>


    // 登录
    $('.login').click(function () {
        layer.open({
            type: 2,
            area: [selfRotationHeight() ? '300px' : '500px', selfRotationHeight() ? '200px' : '400px'],
            fixed: true,
            shadeClose: true,
            maxmin: true,
            content: '/toLogin',
        });
    })

    function selfRotationHeight() {
        return window.innerWidth < 700;
    }


    AOS.init({
        duration: 700
    });

    <!-- 禁用小于 1200px 的动画，如果你喜欢可以更改值 -->

    AOS.init({
        disable: function () {
            var maxWidth = 1200;
            return window.innerWidth < maxWidth;
        }
    });
    $(function () {
        $('[data-toggle="popover"]').popover()
    })
    $('.popover-dismiss').popover({
        trigger: 'focus'
    })
    $(function () {
        $('[data-toggle="tooltip"]').tooltip()
    })
</script>
