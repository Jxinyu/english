<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <link rel="apple-touch-icon" sizes="76x76" href="/static/assets/img/favicon.ico">
    <link rel="icon" type="image/png" href="/static/assets/img/favicon.ico">
    <title>english-星球登录</title>
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, shrink-to-fit=no'
          name='viewport'/>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="/static/assets/css/all.css">

    <!-- Main CSS -->
    <link href="/static/assets/css/main.css" rel="stylesheet"/>

    <!-- Animation CSS -->
    <link href="/static/assets/css/vendor/aos.css" rel="stylesheet"/>

    <!--ayui-->
    <link href="/static/layui/css/layui.css" rel="stylesheet"/>
    <link href="/static/layui/css/modules/laydate/default/laydate.css" rel="stylesheet"/>
    <link href="/static/layui/css/modules/layer/default/layer.css" rel="stylesheet"/>

</head>

<body>

<main class="container">
    <div class="col justify-content-between mt-5">
        <div class="col-md-10 layui-form">
            <h4 class="mb-4 h5">english-星球 起飞~</h4>
            <form method="get" action="/login">
                <div class="form-group">
                    <input type="text" name="name" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                           placeholder="账号" required="">
                    <small id="emailHelp" class="form-text text-muted">We'll never share your name with anyone
                        else.</small>
                </div>
                <div class="form-group">
                    <input type="password" name="pwd" class="form-control" id="exampleInputPassword1" placeholder="密码"
                           required="">
                </div>
                <div class="form-group form-check">
                    <input type="checkbox" name="rememberMe" title="记住我" lay-skin="primary">
                </div>
                <button type="submit" class="btn btn-success btn-round" lay-submit lay-filter="formDemo">登录</button>
            </form>
        </div>
    </div>
</main>


<!--------------------------------------
JAVASCRIPTS
--------------------------------------->
<script src="/static/assets/js/vendor/jquery.min.js" type="text/javascript"></script>
<script src="/static/assets/js/vendor/popper.min.js" type="text/javascript"></script>
<script src="/static/assets/js/vendor/bootstrap.min.js" type="text/javascript"></script>
<script src="/static/assets/js/vendor/share.js" type="text/javascript"></script>
<script src="/static/assets/js/functions.js" type="text/javascript"></script>
<script src="/static/layui/layui.js" type="text/javascript"></script>

<!-- Animation -->
<script src="/static/assets/js/vendor/aos.js" type="text/javascript"></script>
<noscript>
    <style>
        *[data-aos] {
            display: block !important;
            opacity: 1 !important;
            visibility: visible !important;
        }
    </style>
</noscript>
<script>
    layui.use('form', function(){
        var form = layui.form;

        //提交
        form.on('submit(formDemo)', function(data){
            $.ajax({
                url: '/english/login',
                data: data.field,
                method: 'post',
                dataType: 'json',
                async: false,
                success: function (res){
                    if (res.msg === 'success'){
                        var index = parent.layer.getFrameIndex(window.name);
                        parent.layer.close(index);
                        parent.location.reload(); // 更新父级页面
                    }else{
                        layer.msg(res.msg)
                    }
                },
                error: function (res) {
                    console.log('错误', res)
                }
            })
            return false;
        });
    });

    AOS.init({
        duration: 700
    });

    <!-- 禁用小于 1200px 的动画，如果你喜欢可以更改值 -->

    AOS.init({
        disable: function () {
            var maxWidth = 1200;
            return window.innerWidth < maxWidth;
        }
    });
    $(function () {
        $('[data-toggle="popover"]').popover()
    })
    $('.popover-dismiss').popover({
        trigger: 'focus'
    })
    $(function () {
        $('[data-toggle="tooltip"]').tooltip()
    })
</script>

</body>
</html>
