<script>
    $('.click_reminder').on('click', function (obj) {
        layer.prompt({title: '输入内容，并确认', formType: 2}, function (content, index) {
            $.ajax({
                url: '/english/sendEmail',
                method: 'get',
                data: {
                    content: '<div style="width: 100%; height: 90vh;background-image: linear-gradient(90deg, #FFDEE9 0%, #B5FFFC 100%);' +
                        '">' +
                        '    <p style="font-size: 25px;' +
                        '  font-weight: bold;' +
                        '  background: linear-gradient(to right, #f12711, #f5af19, #f5af19, #f12711);' +
                        '  -webkit-background-clip: text;' +
                        '  -webkit-text-fill-color: transparent;margin: 20px 20px">' + content + '</p>' +
                        '</div>',
                    subject: '宝贝来催你打卡啦~~'
                },
                success: function (res) {
                    layer.close(index)
                    if (res.code === 200) {
                        layer.msg('发送成功')
                    } else {
                        layer.msg('稍后重试')
                    }
                }
            })
        });

    })

    $('.clearData').on('click', function (obj) {
        layer.open({
            title: '选择清空类型'  //标题
            , content:
                '    <div>' +
                '      <select class="clearDataValue" name="val" style="height: 60px; width: 80%;font-size: 25px;' +
                'text-align: center;color: #1bb144;background-color: #90ffa5;">' +
                '        <option value="-1" selected>点击选择</option>' +
                '        <option value="common">普通类型</option>' +
                '        <option value="red">红宝书必考词</option>' +
                '        <option value="love">恋恋有词</option>' +
                '        <option value="love_middle">恋恋有词中频词</option>' +
                '      </select>' +
                '    </div>'//提示内容  可以为html
            , area: '240px'   // 大小
            , shadeClose: true //开启遮罩关闭
            , btn: ['确定', '取消']  // 两个按钮内容， 可以多个
            , yes: function (index) {  //第一个按钮  '确定结束'
                var mold = $('.clearDataValue').val()
                if (mold === '-1') {
                    layer.close(index)
                    return
                }
                $.ajax({
                    url: '/english/clearClockData/' + mold,
                    method: 'post',
                    success: function (res) {
                        layer.close(index)
                        if (res.code === 200) {
                            layer.msg(res.msg)
                        } else {
                            layer.msg('清空失败，请刷新重试。' + res.msg + '或联系管理员')
                        }
                    }
                })
            }
        });
    })

    layui.use(['layer', 'table', 'form'], function () {
        var table = layui.table;
        queryData("/english/getSelf")
        queryAllCordData('/english/queryAllCordData')
        var conn = null;

        // 获取表格数据
        function queryData(url) {
            table.render({
                elem: '#imgTable'
                , url: url //数据接口
                , page: true
                , skin: 'gird'
                , parseData: function (res) {
                    conn = res
                    return {
                        "code": res.code, // 解析接口状态
                        "msg": res.msg, // 解析提示文本
                        "count": res.data.count, // 解析数据长度
                        "data": res.data // 解析数据列表
                    };
                }
                , response: {
                    statusCode: 200 //规定成功的状态码
                }
                , css: [
                    // 对开启了编辑的单元格追加样式
                    '.layui-table-view td[data-edit]{color: #16B777;}'
                ].join('')
                , cols: [
                    [
                        {field: 'user_name', title: '用户', width: 72}
                        , {field: 'nowDayNum', title: '今日数量', width: 86}
                        , {
                        field: 'nowDayComplete', title: '今完？', width: 72, templet: function (d) {
                            return '<span style="color: red; font-size: 20px">' + (d.nowDayComplete === 1 ? 'yes' : 'no') + '</span>'
                        }
                    }
                        , {
                        field: 'eachDayNum', title: '每日计划', edit: 'true', width: 100, templet: function (d) {
                            return '<span style="color: #0fb1ff">' + d.eachDayNum + '个</span>'
                        }
                    }
                        , {field: 'allNum', title: '总数量', width: 72}
                        , {field: 'allDay', title: '总天数', width: 72}
                        , {field: 'allCompleDay', title: '完成总天数', width: 100}
                        , {field: 'wmoldChoice', title: '单词类型选择', width: 150, templet: '#TPL-select-city'}
                        , {field: 'o_nowDayNum', title: '宝贝今日单词数', width: 150}
                        , {
                        field: 'o_nowDayComplete', title: '宝贝今完？', width: 150, templet: function (d) {
                            return '<span style="color: red; font-size: 20px">' + (d.o_nowDayComplete === 1 ? 'yes' : 'no') + '</span>'
                        }
                    }
                        , {
                        field: 'o_eachDayNum', title: '宝贝每日计划', width: 150, templet: function (d) {
                            return '<span style="color: #0fb1ff">' + d.o_eachDayNum + '</span>'
                        }
                    }
                        , {field: 'o_allNum', title: '宝贝总数量', width: 100}
                    ]
                ]
                , done: function (res, curr, count) {

                    // console.log(conn)


                    var options = this;
                    // 获取当前行数据
                    table.getRowData = function (elem) {
                        var index = $(elem).closest('tr').data('index');
                        return table.cache[options.id][index] || {};
                    };
                    defaultChoiceSelectOption()

                    function defaultChoiceSelectOption() {
                        $(".select-wmoldChoice").find("option[name='true']").attr('selected', 'selected')
                    }

                    table.on('edit(imgFilter)', function (obj) {
                        var value = obj.value // 得到修改后的值
                        var data = obj.data // 得到所在行所有键值

                        // 值的校验
                        if (value.replace(/\s/g, '') === '') {
                            layer.tips('值不能为空', this, {tips: 1});
                            return obj.reedit(); // 重新编辑 -- v2.8.0 新增
                        }
                        var reg = /^\d+$/;
                        if (!(reg.test(value))) {
                            layer.tips('值不是数字', this, {tips: 1});
                            return obj.reedit(); // 重新编辑 -- v2.8.0 新增
                        }
                        sendData(data)
                    });

                    // layui form select 事件
                    $('.select-wmoldChoice').on('change', function () {
                        var value = this.value; // 获取选中项 value
                        var data = table.getRowData(this); // 获取当前行数据(如 id 等字段，以作为数据修改的索引)
                        data.wmoldChoice = value
                        sendData(data)
                    });

                    function sendData(data) {
                        $.ajax({
                            url: '/english/self/update',
                            method: 'post',
                            data: {
                                ulId: data.ulId,
                                uId: data.uId,
                                allDay: data.allDay,
                                allNum: data.allNum,
                                allCompleDay: data.allCompleDay,
                                eachDayNum: data.eachDayNum,
                                memoMode: data.memoMode,
                                nowDayComplete: data.nowDayComplete,
                                nowDayNum: data.nowDayNum,
                                uConnId: data.uConnId,
                                wMoldChoice: data.wmoldChoice
                            },
                            success: function (res) {
                                if (res.code === 200) {
                                    layer.msg('修改成功')
                                } else {
                                    layer.msg('修改失败，刷新后重试')
                                }
                            }
                        })
                    }
                }
            });
        }

        function queryAllCordData(url) {
            table.render({
                elem: '#all_Record'
                , url: url //数据接口
                , page: true
                , skin: 'gird'
                , request: { //请求的参数
                    pageName: 'page' //页码的参数名称，默认：page
                    , limitName: 'limit' //每页数据量的参数名，默认：limit
                }
                , parseData: function (res) {
                    return {
                        "code": res.code, // 解析接口状态
                        "msg": res.msg, // 解析提示文本
                        "count": res.count, // 解析数据长度
                        "data": res.data // 解析数据列表
                    };
                }
                , response: {
                    statusCode: 200 //规定成功的状态码
                }
                , cols: [
                    [
                        {field: 'cdate', title: '打卡时间', width: 150}
                        , {field: 'cwordNum', title: '单词数', width: 72}
                    ]
                ]
            });
        }


    })


    AOS.init({
        duration: 700
    });

    <!-- 禁用小于 1200px 的动画，如果你喜欢可以更改值 -->

    AOS.init({
        disable: function () {
            var maxWidth = 1200;
            return window.innerWidth < maxWidth;
        }
    });
    $(function () {
        $('[data-toggle="popover"]').popover()
    })
    $('.popover-dismiss').popover({
        trigger: 'focus'
    })
    $(function () {
        $('[data-toggle="tooltip"]').tooltip()
    })
</script>
<script type="text/html" id="TPL-select-city">
    <select name="wmoldChoice" class="layui-border-green select-wmoldChoice" lay-ignore>
        <option value="common" name="{{d.wMoldChoice=='common'? 'true': 'false'}}">普通</option>
        <option value="red" name="{{d.wMoldChoice=='red'? 'true': 'false'}}">红宝书必考词</option>
        <option value="love" name="{{d.wMoldChoice=='love'? 'true': 'false'}}">练练有词</option>
        <option value="love_middle" name="{{d.wMoldChoice=='love_middle'? 'true': 'false'}}">练练有词中频词</option>
    </select>
</script>
